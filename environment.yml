# OpenPilot Conda Environment Requirements
# 使用方法：conda env create -f environment.yml

name: openpilot
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - openai>=1.0.0
      - httpx[socks]>=0.24.0
      - pydantic>=2.7.0
      - pydantic-settings>=2.2.0
      - python-dotenv>=1.0.0
      - rich>=13.7.0
      - prompt-toolkit>=3.0.0
      # Development dependencies (optional)
      - pytest>=8.0.0
